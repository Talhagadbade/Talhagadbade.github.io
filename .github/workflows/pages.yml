name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A06D67: ${{ secrets.A06D67 }}
          BB76FF: ${{ secrets.BB76FF }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('A06D67', '')
          bm = os.environ.get('BB76FF', '')
          p = pathlib.Path('index.html')
          s = s2 = p.read_text(encoding='utf-8')
          if gm:
              s2 = s2.replace('<!-- 4c94bfc48e3b2748e4c8df9305e262f7850d7e -->', gm)
          if bm:
              s2 = s2.replace('<!-- 2fda1fe3b05a16e1eb5a8f301b105dfa79 -->', bm)
          if s2 == s and (gm or bm):
              sys.exit(1)
          if s2 != s:
              p.write_text(s2, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
